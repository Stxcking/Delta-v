# Bar walls and bends for detention/security areas
- type: entity
  parent: BaseStructureWall
  id: WallBar
  name: bar wall
  description: A wall made of security bars.
  components:
  - type: Sprite
    sprite: _DV/Structures/Walls/Cells/bar.rsi
    state: bar
  - type: Icon
    sprite: _DV/Structures/Walls/Cells/bar.rsi
    state: bar
  - type: IconSmooth
    key: walls
    base: bar
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 450
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          Girder:
            min: 1
            max: 1

- type: entity
  parent: BaseStructureWall
  id: WallBarWindow
  name: bar wall with window
  description: A bar wall with a reinforced window.
  components:
  - type: Sprite
    sprite: _DV/Structures/Walls/Cells/bar.rsi
    state: bar_window
  - type: Icon
    sprite: _DV/Structures/Walls/Cells/bar.rsi
    state: bar_window
  - type: IconSmooth
    key: walls
    base: bar_window
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 400
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          Girder:
            min: 1
            max: 1

- type: entity
  parent: BaseStructureWall
  id: WallBarBend
  name: bar wall bend
  description: A curved corner section of bar wall.
  components:
  - type: Sprite
    sprite: _DV/Structures/Walls/Cells/bar_bend.rsi
    state: bar_bend
  - type: Icon
    sprite: _DV/Structures/Walls/Cells/bar_bend.rsi
    state: bar_bend
  - type: IconSmooth
    key: walls
    base: bar_bend
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 450
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          Girder:
            min: 1
            max: 1
