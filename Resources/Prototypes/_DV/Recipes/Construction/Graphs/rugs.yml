- type: constructionGraph
  id: N14RugRecipes
  start: start
  graph:
    - node: start
      actions:
        - !type:DestroyEntity
      edges:
        - to: blueRug
          steps:
            - material: FloorCarpetBlue
              amount: 4
              doAfter: 2
        - to: purpleRug
          steps:
            - material: FloorCarpetPurple
              amount: 4
        - to: redRug
          steps:
            - material: FloorCarpetRed
              amount: 4
              doAfter: 2
        - to: orangeRug
          steps:
            - material: FloorCarpetOrange
              amount: 4
              doAfter: 2

    - node: blueRug
      entity: N14RugBlue
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: CarpetBlue
              amount: 4
          steps:
            - tool: Screwing
              doAfter: 1

    - node: purpleRug
      entity: N14RugPurple
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: CarpetPurple
              amount: 4
          steps:
            - tool: Screwing
              doAfter: 1

    - node: redRug
      entity: N14RugRed
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: Carpet
              amount: 4
          steps:
            - tool: Screwing
              doAfter: 1

    - node: orangeRug
      entity: N14RugYellow
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: CarpetOrange
              amount: 4
          steps:
            - tool: Screwing
              doAfter: 1
