              southRotation: true
          steps:
            - material: WoodPlank
              amount: 2
              doAfter: 1
        - to: N14WoodRound
          completed:
            - !type:SnapToGrid
              southRotation: true
          steps:
            - material: WoodPlank
              amount: 2
              doAfter: 1
        - to: N14WoodStand
