              southRotation: true
          steps:
            - material: WoodPlank
              amount: 2
              doAfter: 1
        - to: N14MetalRolling
          completed:
            - !type:SnapToGrid
              southRotation: true
          steps:
            - material: Steel
              amount: 3
              doAfter: 2
        - to: N14WoodCounterFrame
          completed:
