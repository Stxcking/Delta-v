- type: constructionGraph
  id: StandingShelves
  start: start
  graph:
    - node: start
      actions:
        - !type:DestroyEntity
      edges:
        - to: SmallWoodStandingShelf
          completed:
            - !type:SnapToGrid
          steps:
            - material: WoodPlank
              amount: 3
              doAfter: 2
        - to: SmallMetalStandingShelf
          completed:
            - !type:SnapToGrid
          steps:
            - material: Steel
              amount: 3
              doAfter: 2
        - to: LargeWoodStandingShelf
          completed:
            - !type:SnapToGrid
          steps:
            - material: WoodPlank
              amount: 4
              doAfter: 3
        - to: LargeMetalStandingShelf
          completed:
            - !type:SnapToGrid
          steps:
            - material: MetalRod
              amount: 2
              doAfter: 1
            - material: Steel
              amount: 4
              doAfter: 2
        - to: LargeWoodDrawerStandingShelf
          completed:
            - !type:SnapToGrid
          steps:
            - material: MetalRod
              amount: 2
              doAfter: 1
            - material: WoodPlank
              amount: 4
              doAfter: 3
        - to: MetalStandingShelfMedical
          completed:
            - !type:SnapToGrid
          steps:
            - material: MetalRod
              amount: 2
              doAfter: 1
            - material: Glass
              amount: 2
              doAfter: 2
            - material: Steel
              amount: 4
              doAfter: 3
        - to: MetalStandingShelf
          completed:
            - !type:SnapToGrid
          steps:
            - material: Steel
              amount: 5
              doAfter: 2
        - to: FruitStand
          completed:
            - !type:SnapToGrid
          steps:
            - material: MetalRod
              amount: 2
              doAfter: 1
            - material: WoodPlank
              amount: 4
              doAfter: 2
        - to: FoodStand
          completed:
            - !type:SnapToGrid
          steps:
            - material: MetalRod
              amount: 2
              doAfter: 1
            - material: Steel
              amount: 5
              doAfter: 3

## Deconstruction
# Small Shelves
    - node: SmallWoodStandingShelf
      entity: SmallWoodStandingShelf
      edges:
        - to: start
          completed:
            - !type:EmptyAllContainers
            - !type:GivePrototype
              prototype: MaterialWoodPlank1
              amount: 3
            - !type:DeleteEntity
          steps:
            - tool: Screwing
              doAfter: 2

    - node: SmallMetalStandingShelf
      entity: SmallMetalStandingShelf
      edges:
        - to: start
          completed:
            - !type:EmptyAllContainers
            - !type:GivePrototype
              prototype: SheetSteel1
              amount: 5
            - !type:DeleteEntity
          steps:
            - tool: Screwing
              doAfter: 2

