- type: entity
  id: N14CarpetSingleBase
  parent: BaseStructure
  description: Better than the floor.
  abstract: true
  components:
  - type: Sprite
    drawdepth: FloorTiles
  - type: Physics
    canCollide: false
  - type: Fixtures
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 10
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
          - !type:SpawnEntitiesBehavior
            spawn:
              MaterialCloth1:
                min: 3
                max: 3

# 64x64 rugs
- type: entity
  id: N14RugBlue
  parent: N14CarpetSingleBase
  name: blue rug
  description: A modern looking blue rug.
  placement:
    mode: PlaceFree
  components:
  - type: Sprite
    sprite: _DV/Structures/Decoration/rugs.rsi
    state: blue
  - type: Construction
    graph: N14RugRecipes
    node: blueRug
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 10
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:SpawnEntitiesBehavior
        spawn:
          CarpetBlue:
            min: 4
            max: 4

