# Bases
- type: entity
  id: WoodStandingShelfBase
  parent: BaseStructure
  abstract: true
  name: wooden standing shelf
  description: A piece of furniture to store or display things.
  components:
  - type: Damageable
    damageModifierSet: Wood
    damageContainer: StructuralInorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 60
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroyHeavy
          params:
            volume: -6
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank1:
            min: 3
            max: 6
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Storage
    grid:
    - 0,0,3,1
    - 0,3,3,4
    maxItemSize: Normal
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
  - type: InteractionOutline
  - type: Clickable
  - type: Anchorable
  - type: Rotatable

- type: entity
  id: MetalStandingShelfBase
  parent: WoodStandingShelfBase
  abstract: true
  name: metal standing shelf
  components:
  - type: Damageable
    damageModifierSet: Metallic
    damageContainer: StructuralInorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 80
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -6
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 5
      - !type:DoActsBehavior
        acts: ["Destruction"]

#region Shelves
- type: entity
  id: SmallWoodStandingShelf
  parent: WoodStandingShelfBase
  name: small wooden standing shelf
  components:
  - type: Sprite
    sprite: _DV/Structures/Storage/Shelves/small_shelves.rsi
    state: wood
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        density: 50
        mask:
        - TableMask
        layer:
        - MidImpassable
  - type: Construction
    graph: StandingShelves
    node: SmallWoodStandingShelf

