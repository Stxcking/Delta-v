    sprite: _DV/Structures/Storage/delistand.rsi
    layers:
    - state: stand
    - state: food-0
      map: ["enum.StorageFillLayers.Fill"]
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.3,0.45,0.3"
        density: 70
        mask:
        - TableMask
        layer:
        - MidImpassable
  - type: StorageFillVisualizer
    maxFillLevels: 5
    fillBaseName: food
  - type: Appearance
  - type: Storage
    grid:
    - 0,0,5,4
    maxItemSize: Normal
    whitelist:
      tags:
      - Meat
      - Fruit
      - ClothMade
      - Pizza
      - ReptilianFood
      - Slice
      - Bread
      - Pie
      - Cake
      - Soup
  - type: Construction
    graph: StandingShelves
    node: FoodStand

#endregion
