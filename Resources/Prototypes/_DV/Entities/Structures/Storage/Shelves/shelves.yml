- type: entity
  id: LargeWoodDrawerStandingShelf
  parent: WoodStandingShelfBase
  name: large wooden standing shelf with drawers
  components:
  - type: Sprite
    sprite: _DV/Structures/Storage/Shelves/big_shelves.rsi
    offset: "0.35,0.3"
    layers:
    - state: wood_drawers
      map: ["enum.StorageVisualLayers.Base"]
    - state: wood_drawers_open
      map: ["enum.StorageVisualLayers.Door"]
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.35,-0.2,1.1,0.5"
        density: 70
        mask:
        - TableMask
        layer:
        - MidImpassable
  - type: Appearance
  - type: EntityStorageVisuals
    stateDoorClosed: wood_drawers
    stateDoorOpen: wood_drawers_open
  - type: EntityStorage
    closeSound:
      path: /Audio/Effects/woodenclosetclose.ogg
    openSound:
      path: /Audio/Effects/woodenclosetopen.ogg
  - type: Storage
    grid:
    - 0,0,4,2
    - 0,5,4,6
    maxItemSize: Large
  - type: Construction
    graph: StandingShelves
    node: LargeWoodDrawerStandingShelf

- type: entity
  id: MetalStandingShelfMedical
  parent: MetalStandingShelfBase
  name: medical standing shelf cabinet
  description: A white medical cabinet with a blue cross on the door.
  components:
  - type: Sprite
    sprite: _DV/Structures/Storage/Shelves/metal_medical.rsi
    layers:
    - state: shelf
      map: ["enum.StorageVisualLayers.Base"]
    - state: bloodpack
      map: ["bloodpack"]
      visible: false
    - state: bruisepack
      map: ["bruisepack"]
      visible: false
    - state: gauze
      map: ["gauze"]
      visible: false
    - state: mesh
      map: ["mesh"]
      visible: false
    - state: ointment
      map: ["ointment"]
      visible: false
    - state: suture
      map: ["suture"]
      visible: false
    - state: closed
      map: ["enum.StorageVisualLayers.Door"]
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.3,0.4,0.3"
        density: 70
        mask:
        - TableMask
        layer:
        - MidImpassable
  - type: Appearance
  - type: EntityStorageVisuals
    stateDoorOpen: open
    stateDoorClosed: closed
  - type: EntityStorage
  - type: Storage
    grid:
    - 0,0,5,5
  - type: ItemMapper
    sprite: _DV/Structures/Storage/Shelves/metal_medical.rsi
    mapLayers:
      bloodpack:
        whitelist:
          tags:
            - Bloodpack
      bruisepack:
        whitelist:
          tags:
            - Brutepack
      gauze:
        whitelist:
          tags:
            - Gauze
      mesh:
        whitelist:
          tags:
            - RegenerativeMesh
      ointment:
        whitelist:
          tags:
            - Ointment
      suture:
        whitelist:
          tags:
            - MedicatedSuture
  - type: Construction
    graph: StandingShelves
    node: MetalStandingShelfMedical


- type: entity
  parent: MetalStandingShelfMedical
  id: MetalStandingShelfMedicalFilled
  suffix: Filled
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: Brutepack
          amount: 3
        - id: Bloodpack
          amount: 2
        - id: Ointment
          amount: 3
        - id: Gauze
          amount: 2
        - id: RegenerativeMesh
        - id: MedicatedSuture

