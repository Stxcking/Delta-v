#region Stands

- type: entity
  id: FruitStand
  parent: WoodStandingShelfBase
  name: wooden fruit stand
  description: A wooden stand, perfect for storing fruit.
  components:
  - type: Sprite
    sprite: _DV/Structures/Storage/fruitstand.rsi
    layers:
    - state: stand
    - state: fruit-0
      map: ["enum.StorageFillLayers.Fill"]
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.35,-0.2,0.35,0.2"
        density: 45
        mask:
        - TableMask
        layer:
        - MidImpassable
  - type: StorageFillVisualizer
    maxFillLevels: 5
    fillBaseName: fruit
  - type: Appearance
  - type: Storage
    grid:
    - 0,0,4,3
    maxItemSize: Normal
    whitelist:
      tags:
      - Fruit
      - Vegetable
  - type: Construction
    graph: StandingShelves
    node: FruitStand

- type: entity
  id: FoodStand
  parent: MetalStandingShelfBase
  name: metal food stand
  description: A metal display, perfect for storing food.
  components:
