# Stands
- type: entity
  id: FruitStand
  parent: WoodStandingShelfBase
  name: wooden fruit stand
  description: A wooden stand, perfect for storing fruit.
  components:
  - type: Sprite
    sprite: _DV/Structures/Storage/fruitstand.rsi
    layers:
    - state: stand
    - state: fruit-0
      map: ["enum.StorageFillLayers.Fill"]
  - type: StorageFillVisualizer
    maxFillLevels: 4
    fillBaseName: fruit
  - type: Storage
    grid:
    - 0,0,4,3
    maxItemSize: Normal
    whitelist:
      tags:
      - Fruit
  - type: Construction
    graph: StandingShelf
    node: fruitstand

- type: entity
  id: FoodStand
  parent: MetalStandingShelfBase
  name: metal food stand
  description: A metal display, perfect for storing food.
  components:
  - type: Sprite
    sprite: _DV/Structures/Storage/delistand.rsi
    layers:
    - state: stand
    - state: food-0
      map: ["enum.StorageFillLayers.Fill"]
  - type: StorageFillVisualizer
    maxFillLevels: 4
    fillBaseName: food
  - type: Storage
    grid:
    - 0,0,4,4
    maxItemSize: Normal
    whitelist:
      tags:
      - Meat
      - Fruit
      - ClothMade
      - Pizza
      - ReptilianFood
      - Slice
      - Bread
      - Pie
      - Cake
      - Soup
  - type: Construction
    graph: StandingShelf
    node: foodstand
